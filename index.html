// ─── HELPERS ────────────────────────────────────────
const pad = n => n < 10 ? '0'+n : ''+n;
const toDateStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today = () => toDateStr(new Date());
const addDays = (s, n) => { const d = new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return toDateStr(d); };
const isSunday = s => new Date(s+'T00:00:00').getDay() === 0;
const parseTime = t => {
  if(!t) return 9999;
  const m = t.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if(!m) return 9999;
  let h = parseInt(m[1]); const min = parseInt(m[2]||'0'); const pm = m[3].toUpperCase()==='PM';
  if(pm && h!==12) h+=12; if(!pm && h===12) h=0;
  return h*60 + min;
};
const dayLabel = s => {
  const t = today();
  if(s===t) return 'Today';
  if(s===addDays(t,-1)) return 'Yesterday';
  if(s===addDays(t,1)) return 'Tomorrow';
  return new Date(s+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
};

function getActiveSupplements(isRestDay, dateStr) {
  const groups = SUPPLEMENT_GROUPS.map(g=>({...g, items:[...g.items]}));
  if(isRestDay) {
    for(const g of groups) g.items = g.items.filter(i=>!i.skipOnRest);
  }
  return groups;
}
function getActiveSuppItems(isRestDay, dateStr) {
  const sunday = isSunday(dateStr);
  let items = [];
  for(const g of getActiveSupplements(isRestDay, dateStr)) {
    for(const i of g.items) {
      if(i.sundayOnly && !sunday) continue;
      items.push(i);
    }
  }
  return items;
}

function emptyLog() {
  return { restDay:false, water:0, hydration:{}, supplements:{}, meals:{breakfast:null,lunch:null,dinner:null,snackPre:null,snackAfternoon:null,snackHRX:null}, drinks:[] };
}

function loadLog(dateStr) {
  try {
    const raw = localStorage.getItem(`log:${dateStr}`);
    if(raw) {
      const d = JSON.parse(raw);
      return {...emptyLog(), ...d, meals:{...emptyLog().meals, ...(d.meals||{})}, drinks: d.drinks || []};
    }
  } catch(e) {}
  return emptyLog();
}

function saveLog(dateStr, data) {
  try { localStorage.setItem(`log:${dateStr}`, JSON.stringify(data)); } catch(e) { console.error(e); }
}

function loadWeight(dateStr) {
  try { const v = localStorage.getItem(`weight:${dateStr}`); return v ? parseFloat(v) : null; } catch(e) { return null; }
}
function saveWeight(dateStr, kg) {
  try { if(kg) localStorage.setItem(`weight:${dateStr}`, kg.toString()); else localStorage.removeItem(`weight:${dateStr}`); } catch(e) {}
}

function exportAll() {
  const data = {};
  for(let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    data[k] = localStorage.getItem(k);
  }
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `fatloss-backup-${today()}.json`; a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        let count = 0;
        for(const [k,v] of Object.entries(data)) {
          if(k.startsWith('log:') || k.startsWith('weight:')) {
            localStorage.setItem(k, v);
            count++;
          }
        }
        resolve(count);
      } catch(err) { reject(err); }
    };
    reader.readAsText(file);
  });
}

          <button onClick={()=>{onSelect(null);onClose()}} style={{width:'100%',color:C.danger,border:`1px dashed ${C.danger}`,fontSize:12,fontWeight:600,padding:'8px',borderRadius:12,marginBottom:8}}>
            Clear selection
          </button>
        )}
        {slot.options.map(item => {
          const active = item.id === selectedId;
          return (
            <button key={item.id} onClick={()=>{onSelect(item.id);onClose()}} style={{width:'100%',textAlign:'left',borderRadius:16,padding:'12px 16px',marginBottom:8,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,background:active?C.primarySoft:C.surface,border:`1.5px solid ${active?C.primary:C.border}`}}>
              <span style={{color:C.ink,fontWeight:500,fontSize:14,flex:1}}>{item.name}</span>
              <span style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                <span style={{color:C.primaryDark,fontSize:12,fontWeight:700}}>{item.cal} kcal</span>
                <span style={{color:C.sub,fontSize:11}}>{item.p}g protein</span>
              </span>
              {active && <span style={{background:C.primary,width:20,height:20,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon d={Icons.check} size={12} color="#fff"/></span>}
            </button>
          );
        })}
      </div>
    </Modal>
  );
}

// ─── SETTINGS/BACKUP MODAL ──────────────────────────
function SettingsModal({onClose, onRefresh}) {
  const fileRef = useRef(null);
  const [msg, setMsg] = useState('');
  const handleImport = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try {
      const count = await importData(file);
      setMsg(`✅ Imported ${count} records!`);
      onRefresh();
    } catch(err) { setMsg('❌ Import failed: '+err.message); }
  };
  return (
    <Modal onClose={onClose}>
      <div style={{padding:'24px 20px'}}>
        <h3 style={{color:C.ink,fontWeight:700,fontSize:16,marginBottom:16}}>⚙️ Data & Backup</h3>
        <button onClick={exportAll} style={{width:'100%',padding:'14px',borderRadius:12,background:C.primary,color:'#fff',fontWeight:600,marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <Icon d={Icons.download} size={16} color="#fff"/> Export All Data (JSON)
        </button>
        <button onClick={()=>fileRef.current?.click()} style={{width:'100%',padding:'14px',borderRadius:12,background:C.surface,border:`1.5px solid ${C.border}`,fontWeight:600,color:C.ink,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <Icon d={Icons.upload} size={16} color={C.primary}/> Import Backup
        </button>
        <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{display:'none'}}/>
        {msg && <p style={{color:C.primary,fontSize:13,marginTop:12,textAlign:'center'}}>{msg}</p>}
        <p style={{color:C.sub,fontSize:11,marginTop:16,textAlign:'center'}}>Your progress is stored on this device. Export regularly to keep a backup.</p>
        <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:12,background:C.surface,border:`1px solid ${C.border}`,fontWeight:600,color:C.ink,marginTop:12}}>Close</button>
      </div>
    </Modal>
  );
}

// ─── MAIN APP ───────────────────────────────────────
function App() {
  const [dateStr, setDateStr] = useState(today());
  const [log, setLog] = useState(null);
  const [tab, setTab] = useState('today');
  const [modal, setModal] = useState(null); // 'meal:key' | 'drinks' | 'weight' | 'settings'
  const [timeView, setTimeView] = useState(()=>localStorage.getItem('pref:timeView')==='1');
  const [history, setHistory] = useState({});
  const [refresh, setRefresh] = useState(0);
  const scrollRef = useRef(null);

  // Load log
  useEffect(() => { setLog(loadLog(dateStr)); }, [dateStr, refresh]);
  useEffect(() => { if(scrollRef.current) scrollRef.current.scrollTop = 0; }, [tab, dateStr]);

  // Load history for summary
  useEffect(() => {
    if(tab !== 'summary') return;
    const h = {};
    for(let i=6; i>=0; i--) {
      const d = addDays(dateStr, -i);
      const l = d === dateStr && log ? log : loadLog(d);
      h[d] = calcScore(l, d);
    }
    setHistory(h);
  }, [tab, dateStr, log]);

  // Update helper
  const update = useCallback((fn) => {
    setLog(prev => {
      if(!prev) return prev;
      const next = fn(prev);
      saveLog(dateStr, next);
      return next;
    });
  }, [dateStr]);

  // Computed
  const totals = useMemo(() => {
    if(!log) return {cal:0,p:0,c:0,f:0};
    let cal=0,p=0,c=0,f=0;
    ALL_SLOTS.forEach(s => {
      const m = findMeal(s.key, log.meals[s.key]);
      if(m) { cal+=m.cal; p+=(m.p||0); c+=(m.c||0); f+=(m.f||0); }
    });
    // Hydration h9 (protein milk)
    if(log.hydration.h9) { const h=HYDRATION.find(x=>x.id==='h9'); cal+=h.cal; p+=h.p; c+=h.c; f+=h.f; }
    // Custom drinks
    if(log.drinks) {
      log.drinks.forEach(did => {
        const d = AMUL_DRINKS.find(a=>a.id===did);
        if(d) { cal+=d.cal; p+=(d.p||0); c+=(d.c||0); f+=(d.f||0); }
      });
    }
    return {cal:Math.round(cal), p:Math.round(p*10)/10, c:Math.round(c*10)/10, f:Math.round(f*10)/10};
  }, [log]);

  const targets = useMemo(() => {
    const rest = log?.restDay;
    return {cal: rest?1900:2085, p:165, c:rest?160:210, f:65};
  }, [log]);

  const waterGoal = HYDRATION.reduce((s,h)=>s+h.ml,0) + WATER_GOAL;
  const waterTotal = useMemo(() => {
    if(!log) return 0;
    let w = log.water;
    HYDRATION.forEach(h => { if(log.hydration[h.id]) w += h.ml; });
    return w;
  }, [log]);

  const suppItems = useMemo(() => log ? getActiveSuppItems(log.restDay, dateStr) : [], [log, dateStr]);
  const suppDone = log ? suppItems.filter(i=>log.supplements[i.id]).length : 0;
  const drinksTotalP = useMemo(() => {
    if(!log?.drinks) return 0;
    return log.drinks.reduce((s,did) => { const d=AMUL_DRINKS.find(a=>a.id===did); return s+(d?d.p:0); },0);
  }, [log]);

  // Weight for display
  const currentWeight = loadWeight(dateStr);

  // Streak
  const streak = useMemo(() => {
    let count = 0;
    let d = addDays(today(), -1);
    while(true) {
      const l = loadLog(d);
      const s = calcScore(l, d);
      if(s < 20) break;
      count++;
      d = addDays(d, -1);
      if(count > 365) break;
    }
    return count;
  }, [refresh]);

  if(!log) return <div style={{background:C.bg,minHeight:600,display:'flex',alignItems:'center',justifyContent:'center'}}><p style={{color:C.sub}}>Loading…</p></div>;

  const activeSlot = modal?.startsWith('meal:') ? ALL_SLOTS.find(s=>s.key===modal.slice(5)) : null;

  return (
    <div style={{background:C.bg,fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",height:'100vh',height:'100dvh',display:'flex',justifyContent:'center'}}>
      <div style={{maxWidth:440,width:'100%',background:C.bg,height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
        {/* Header */}
        <div style={{background:C.primary,padding:'20px 20px 16px',borderRadius:'0 0 24px 24px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <p style={{fontSize:11,color:'#CFE3D9',fontWeight:600,letterSpacing:1,textTransform:'uppercase'}}>Daily Tracker</p>
            <div style={{display:'flex',gap:8}}>
              {streak > 0 && <span style={{background:'rgba(255,255,255,0.15)',padding:'4px 10px',borderRadius:12,display:'flex',alignItems:'center',gap:4}}>
                <Icon d={Icons.flame} size={12} color="#FF9500"/><span style={{fontSize:11,fontWeight:700,color:'#fff'}}>{streak}🔥</span>
              </span>}
              <button onClick={()=>update(l=>({...l, restDay:!l.restDay}))} style={{background:log.restDay?C.accent:'rgba(255,255,255,0.16)',padding:'4px 12px',borderRadius:12,display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:11,fontWeight:700,color:'#fff'}}>{log.restDay?'Rest Day':'Training'}</span>
              </button>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12}}>
            <button onClick={()=>setDateStr(addDays(dateStr,-1))} style={{padding:6}}><Icon d={Icons.chevL} size={22} color="#fff"/></button>
            <h1 style={{color:'#fff',fontWeight:700,fontSize:18}}>{dayLabel(dateStr)}</h1>
            <button onClick={()=>setDateStr(addDays(dateStr,1))} style={{padding:6}}><Icon d={Icons.chevR} size={22} color="#fff"/></button>
          </div>
          {/* Quick stats bar */}
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <span style={{background:'rgba(255,255,255,0.12)',padding:'4px 10px',borderRadius:10,fontSize:11,color:'#E0F0E6',fontWeight:600}}>{totals.cal}/{targets.cal} kcal</span>
            <span style={{background:'rgba(255,255,255,0.12)',padding:'4px 10px',borderRadius:10,fontSize:11,color:'#E0F0E6',fontWeight:600}}>{totals.p}g P</span>
            {currentWeight && <span style={{background:'rgba(255,255,255,0.12)',padding:'4px 10px',borderRadius:10,fontSize:11,color:'#E0F0E6',fontWeight:600}}>⚖️ {currentWeight} kg</span>}
          </div>
        </div>

        {/* Content */}
        <div ref={scrollRef} style={{flex:1,padding:'16px 16px',overflowY:'auto'}}>
          {tab === 'today' && timeView && (
            <TimelineView log={log} dateStr={dateStr} update={update} setModal={setModal}
              onToggleTimeView={()=>{setTimeView(false);localStorage.setItem('pref:timeView','0')}}/>
          )}
          {tab === 'today' && !timeView && (
            <Fragment>
              {/* Hydration */}
              <Section icon={<Icon d={Icons.drop} size={18} color={C.primary}/>} title="Hydration" badge={`${(waterTotal/1000).toFixed(1)} / ${(waterGoal/1000).toFixed(1)} L`}>
                <div style={{marginBottom:8}}><ProgressBar value={waterTotal} max={waterGoal}/></div>
                <div style={{borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0'}}>
                  <div>
                    <p style={{color:C.ink,fontSize:14,fontWeight:500}}>Plain Water</p>
                    <p style={{color:C.sub,fontSize:12}}>Goal {WATER_GOAL}ml</p>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <button onClick={()=>update(l=>({...l,water:Math.max(0,l.water-WATER_STEP)}))} style={{background:C.primarySoft,width:28,height:28,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Icon d={Icons.minus} size={14} color={C.primary}/>
                    </button>
                    <span style={{color:C.ink,fontSize:14,fontWeight:600,width:48,textAlign:'center'}}>{log.water}ml</span>
                    <button onClick={()=>update(l=>({...l,water:l.water+WATER_STEP}))} style={{background:C.primary,width:28,height:28,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Icon d={Icons.plus} size={14} color="#fff"/>
                    </button>
                  </div>
                </div>
                {HYDRATION.map(h => (
                  <div key={h.id} style={{borderBottom:`1px solid ${C.border}`}}>
                    <CheckRow checked={!!log.hydration[h.id]} onToggle={()=>update(l=>({...l,hydration:{...l.hydration,[h.id]:!l.hydration[h.id]}}))}
                      title={h.label} subtitle={`${h.time} · ${h.ml}ml`} note={h.note}/>
                  </div>
                ))}
              </Section>

              {/* Supplements */}
              <Section icon={<Icon d={Icons.pill} size={18} color={C.primary}/>} title="Supplements" badge={`${suppDone} / ${suppItems.length}`}>
                {getActiveSupplements(log.restDay, dateStr).map(group => (
                  <div key={group.id} style={{marginBottom:4}}>
                    <p style={{color:C.sub,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,paddingTop:12,paddingBottom:4}}>{group.label} · {group.time}</p>
                    {group.items.map(item => {
                      const dim = item.sundayOnly && !isSunday(dateStr);
                      return (
                        <div key={item.id} style={{borderBottom:`1px solid ${C.border}`}}>
                          <CheckRow checked={!!log.supplements[item.id]} onToggle={()=>!dim && update(l=>({...l,supplements:{...l.supplements,[item.id]:!l.supplements[item.id]}}))}
                            title={item.name} subtitle={item.dose}
                            note={[item.brand, item.sundayOnly?'Sunday only':null].filter(Boolean).join(' · ')} dim={dim}/>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </Section>

              {/* Meals */}
              <Section icon={<Icon d={Icons.fork} size={18} color={C.primary}/>} title="Meals" badge={`${MEAL_SLOTS.filter(s=>log.meals[s.key]).length} / ${MEAL_SLOTS.length}`}>
                {MEAL_SLOTS.map(slot => {
                  const meal = findMeal(slot.key, log.meals[slot.key]);
                  return (
                    <button key={slot.key} onClick={()=>setModal('meal:'+slot.key)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,padding:'12px 0',textAlign:'left',borderBottom:`1px solid ${C.border}`}}>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontSize:11,color:C.sub,fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>{slot.label} · {slot.time}</p>
                        {meal ? (
                          <Fragment>
                            <p style={{color:C.ink,fontSize:14,fontWeight:600,marginTop:4}}>{meal.name}</p>
                            <div style={{display:'flex',gap:6,marginTop:4}}><MacroPill value={meal.cal} label="kcal"/><MacroPill value={`${meal.p}g`} label="protein"/></div>
                          </Fragment>
                        ) : <p style={{color:C.sub,fontSize:14,marginTop:4,fontStyle:'italic'}}>Tap to log</p>}
                      </div>
                      <Icon d={Icons.chevR} size={18} color={C.sub}/>
                    </button>
                  );
                })}
              </Section>

              {/* Protein Drinks (NEW!) */}
              <Section icon={<span style={{fontSize:18}}>🥛</span>} title="Protein Drinks" badge={log.drinks.length > 0 ? `${drinksTotalP}g protein` : 'none'} defaultOpen={true}>
                <p style={{color:C.sub,fontSize:12,marginBottom:8}}>Quick-add Amul protein drinks</p>
                {log.drinks.length > 0 && (
                  <div style={{marginBottom:8}}>
                    {log.drinks.map((did, i) => {
                      const item = AMUL_DRINKS.find(a=>a.id===did);
                      if(!item) return null;
                      return (
                        <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:C.primarySoft,borderRadius:12,marginBottom:4}}>
                          <span style={{fontSize:13}}>{item.emoji} {item.name} <span style={{color:C.sub,fontSize:11}}>({item.p}g P)</span></span>
                          <button onClick={()=>update(l=>({...l,drinks:l.drinks.filter((_,idx)=>idx!==i)}))} style={{color:C.danger,fontSize:18,fontWeight:700}}>×</button>
                        </div>
                      );
                    })}
                  </div>
                )}
                <button onClick={()=>setModal('drinks')} style={{width:'100%',padding:'12px',borderRadius:12,border:`1.5px dashed ${C.primary}`,color:C.primary,fontWeight:600,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <Icon d={Icons.plus} size={14} color={C.primary}/> Add Drink
                </button>
              </Section>

              {/* Snacks */}
              <Section icon={<span style={{fontSize:16}}>🍌</span>} title="Snacks" badge={`${SNACK_SLOTS.filter(s=>!(s.skipOnRest&&log.restDay)&&log.meals[s.key]).length} / ${SNACK_SLOTS.filter(s=>!(s.skipOnRest&&log.restDay)).length}`}>
                {SNACK_SLOTS.filter(s=>!(s.skipOnRest&&log.restDay)).map(slot => {
                  const meal = findMeal(slot.key, log.meals[slot.key]);
                  return (
                    <button key={slot.key} onClick={()=>setModal('meal:'+slot.key)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,padding:'12px 0',textAlign:'left',borderBottom:`1px solid ${C.border}`}}>
                      <div style={{flex:1}}>
                        <p style={{fontSize:11,color:C.sub,fontWeight:600,textTransform:'uppercase'}}>{slot.label} · {slot.time}</p>
                        {meal ? <p style={{color:C.ink,fontSize:14,fontWeight:500,marginTop:4}}>{meal.name}</p> : <p style={{color:C.sub,fontSize:13,marginTop:4,fontStyle:'italic'}}>Tap to log</p>}
                      </div>
                      <Icon d={Icons.chevR} size={16} color={C.sub}/>
                    </button>
                  );
                })}
              </Section>

              {/* Weight + Settings + Time View */}
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <button onClick={()=>setModal('weight')} style={{flex:1,padding:'14px',borderRadius:12,background:C.surface,border:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <span style={{fontSize:16}}>⚖️</span><span style={{fontSize:13,fontWeight:600,color:C.ink}}>{currentWeight ? `${currentWeight} kg` : 'Log Weight'}</span>
                </button>
                <button onClick={()=>{setTimeView(true);localStorage.setItem('pref:timeView','1')}} style={{padding:'14px 18px',borderRadius:12,background:C.surface,border:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <Icon d={Icons.clock} size={16} color={C.primary}/><span style={{fontSize:12,fontWeight:600,color:C.primary}}>Time</span>
                </button>
                <button onClick={()=>setModal('settings')} style={{padding:'14px 18px',borderRadius:12,background:C.surface,border:`1px solid ${C.border}`}}>
                  <span style={{fontSize:16}}>⚙️</span>
                </button>
              </div>
            </Fragment>
          )}

          {tab === 'summary' && (
            <SummaryView day={log} dateStr={dateStr} totals={totals} targets={targets}
              waterTotal={waterTotal} waterGoal={waterGoal} suppDone={suppDone} suppTotal={suppItems.length}
              history={history} onJump={d=>{setDateStr(d);setTab('today')}} drinksTotalP={drinksTotalP}/>
          )}
        </div>

        {/* Bottom Nav */}
        <div style={{background:C.surface,borderTop:`1px solid ${C.border}`,display:'flex',flexShrink:0}}>
          <button onClick={()=>setTab('today')} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'10px'}}>
            <Icon d={Icons.list} size={20} color={tab==='today'?C.primary:C.sub}/>
            <span style={{fontSize:11,fontWeight:600,color:tab==='today'?C.primary:C.sub}}>Today</span>
          </button>
          <button onClick={()=>setTab('summary')} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'10px'}}>
            <Icon d={Icons.chart} size={20} color={tab==='summary'?C.primary:C.sub}/>
            <span style={{fontSize:11,fontWeight:600,color:tab==='summary'?C.primary:C.sub}}>Summary</span>
          </button>
        </div>

        {/* Modals */}
        {activeSlot && <MealPicker slot={activeSlot} selectedId={log.meals[activeSlot.key]} onSelect={id=>update(l=>({...l,meals:{...l.meals,[activeSlot.key]:id}}))} onClose={()=>setModal(null)}/>}
        {modal === 'drinks' && <DrinksPicker drinks={log.drinks||[]} onAdd={id=>update(l=>({...l,drinks:[...(l.drinks||[]),id]}))} onRemove={i=>update(l=>({...l,drinks:l.drinks.filter((_,idx)=>idx!==i)}))} onClose={()=>setModal(null)}/>}
        {modal === 'weight' && <WeightModal dateStr={dateStr} onClose={()=>{setModal(null);setRefresh(r=>r+1)}}/>}
        {modal === 'settings' && <SettingsModal onClose={()=>setModal(null)} onRefresh={()=>setRefresh(r=>r+1)}/>}
      </div>
    </div>
  );
}

// ─── TIMELINE VIEW ──────────────────────────────────
function TimelineView({log, dateStr, update, setModal, onToggleTimeView}) {
  const isRest = log.restDay;
  const sunday = isSunday(dateStr);

  // Build unified timeline items
  const items = useMemo(() => {
    const list = [];

    // Hydration items
    HYDRATION.forEach(h => {
      list.push({type:'hydration', time:h.time, sortKey:parseTime(h.time), id:h.id, label:h.label, sub:`${h.ml}ml`, note:h.note, done:!!log.hydration[h.id]});
    });

    // Supplement groups
    getActiveSupplements(isRest, dateStr).forEach(group => {
      const groupTime = group.time.split('·')[0].trim();
      group.items.forEach(item => {
        if(item.sundayOnly && !sunday) return;
        list.push({type:'supplement', time:groupTime, sortKey:parseTime(groupTime), id:item.id, label:item.name, sub:item.dose, note:item.brand, done:!!log.supplements[item.id], dim:item.sundayOnly&&!sunday});
      });
    });

    // Meal slots
    MEAL_SLOTS.forEach(slot => {
      const meal = findMeal(slot.key, log.meals[slot.key]);
      list.push({type:'meal', time:slot.time, sortKey:parseTime(slot.time), id:slot.key, label:slot.label, sub:meal?meal.name:null, done:!!meal, slotKey:slot.key, meal});
    });

    // Snack slots
    SNACK_SLOTS.filter(s=>!(s.skipOnRest&&isRest)).forEach(slot => {
      const meal = findMeal(slot.key, log.meals[slot.key]);
      list.push({type:'snack', time:slot.time, sortKey:parseTime(slot.time), id:slot.key, label:slot.label, sub:meal?meal.name:null, done:!!meal, slotKey:slot.key, meal});
    });

    // Protein drinks (Amul) — show at 10:30 PM slot
    list.push({type:'drinks', time:'Anytime', sortKey:1350, id:'_drinks', label:'Protein Drinks', sub:log.drinks.length>0?`${log.drinks.length} logged`:'Add drinks', done:log.drinks.length>0});

    // Sort by time
    list.sort((a,b) => a.sortKey - b.sortKey);
    return list;
  }, [log, dateStr, isRest, sunday]);

  // Group by time slot for visual separation
  let lastTime = '';

  const toggleHydration = (id) => update(l=>({...l,hydration:{...l.hydration,[id]:!l.hydration[id]}}));
  const toggleSupp = (id) => update(l=>({...l,supplements:{...l.supplements,[id]:!l.supplements[id]}}));

  const doneCount = items.filter(i=>i.done).length;
  const totalCount = items.length;

  return (
    <Fragment>
      {/* Toggle bar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <Icon d={Icons.clock} size={18} color={C.primary}/>
          <span style={{color:C.ink,fontWeight:700,fontSize:15}}>Time View</span>
          <span style={{color:C.sub,fontSize:12}}>{doneCount}/{totalCount}</span>
        </div>
        <button onClick={onToggleTimeView} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'6px 12px',fontSize:12,fontWeight:600,color:C.primary}}>
          Category View
        </button>
      </div>
      <div style={{marginBottom:8}}><ProgressBar value={doneCount} max={totalCount}/></div>

      {/* Timeline items */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,overflow:'hidden',marginBottom:12}}>
        {items.map((item, idx) => {
          const showTimeHeader = item.time !== lastTime;
          lastTime = item.time;
          const typeEmoji = item.type==='hydration'?'💧':item.type==='supplement'?'💊':item.type==='meal'?'🍽️':item.type==='snack'?'🍌':item.type==='drinks'?'🥛':'';
          const isMealType = item.type==='meal'||item.type==='snack';
          const isDrinks = item.type==='drinks';

          return (
            <Fragment key={item.type+item.id}>
              {showTimeHeader && (
                <div style={{background:C.primarySoft,padding:'6px 16px',display:'flex',alignItems:'center',gap:6}}>
                  <Icon d={Icons.clock} size={12} color={C.primary}/>
                  <span style={{color:C.primary,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>{item.time}</span>
                </div>
              )}
              {isMealType ? (
                <button onClick={()=>setModal('meal:'+item.slotKey)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 16px',textAlign:'left',borderBottom:idx<items.length-1?`1px solid ${C.border}`:'none'}}>
                  <span style={{flexShrink:0,width:24,height:24,borderRadius:12,border:`2px solid ${item.done?C.primary:C.border}`,background:item.done?C.primary:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {item.done && <Icon d={Icons.check} size={14} color="#fff"/>}
                  </span>
                  <span style={{flex:1,minWidth:0}}>
                    <span style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:13}}>{typeEmoji}</span>
                      <span style={{color:C.ink,fontSize:14,fontWeight:600}}>{item.label}</span>
                    </span>
                    {item.sub && <span style={{display:'block',color:item.done?C.primary:C.sub,fontSize:12,marginTop:2}}>{item.sub}</span>}
                    {item.meal && <span style={{display:'block',fontSize:11,color:C.sub}}>{item.meal.cal} kcal · {item.meal.p}g protein</span>}
                  </span>
                  <Icon d={Icons.chevR} size={14} color={C.sub}/>
                </button>
              ) : isDrinks ? (
                <button onClick={()=>setModal('drinks')} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 16px',textAlign:'left',borderBottom:idx<items.length-1?`1px solid ${C.border}`:'none'}}>
                  <span style={{flexShrink:0,width:24,height:24,borderRadius:12,border:`2px solid ${item.done?C.primary:C.border}`,background:item.done?C.primary:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {item.done && <Icon d={Icons.check} size={14} color="#fff"/>}
                  </span>
                  <span style={{flex:1}}>
                    <span style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:13}}>🥛</span>
                      <span style={{color:C.ink,fontSize:14,fontWeight:600}}>{item.label}</span>
                    </span>
                    <span style={{display:'block',color:C.sub,fontSize:12,marginTop:2}}>{item.sub}</span>
                  </span>
                  <Icon d={Icons.chevR} size={14} color={C.sub}/>
                </button>
              ) : (
                <button onClick={()=>item.type==='hydration'?toggleHydration(item.id):toggleSupp(item.id)}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 16px',textAlign:'left',borderBottom:idx<items.length-1?`1px solid ${C.border}`:'none',opacity:item.dim?.4:1}}>
                  <span style={{flexShrink:0,width:24,height:24,borderRadius:12,border:`2px solid ${item.done?C.primary:C.border}`,background:item.done?C.primary:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {item.done && <Icon d={Icons.check} size={14} color="#fff"/>}
                  </span>
                  <span style={{flex:1,minWidth:0}}>
                    <span style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:13}}>{typeEmoji}</span>
                      <span style={{color:item.done?C.sub:C.ink,fontSize:14,fontWeight:500,textDecoration:item.done?'line-through':'none'}}>{item.label}</span>
                    </span>
                    {(item.sub||item.note) && <span style={{display:'block',color:C.sub,fontSize:12,marginTop:2}}>{[item.sub,item.note].filter(Boolean).join(' · ')}</span>}
                  </span>
                </button>
              )}
            </Fragment>
          );
        })}
      </div>
    </Fragment>
  );
}

// ─── SUMMARY VIEW ───────────────────────────────────
function SummaryView({day, dateStr, totals, targets, waterTotal, waterGoal, suppDone, suppTotal, history, onJump, drinksTotalP}) {
  const calPct = Math.round(totals.cal / targets.cal * 100);
  const activeSlots = ALL_SLOTS.filter(s=>!(s.skipOnRest && day.restDay));
  // Weight history
  const [weights, setWeights] = useState({});
  useEffect(() => {
    const w = {};
    for(let i=6; i>=0; i--) {
      const d = addDays(dateStr, -i);
      w[d] = loadWeight(d);
    }
    setWeights(w);
  }, [dateStr]);

  return (
    <Fragment>
      {/* Calories card */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:12,textAlign:'center'}}>
        <p style={{color:C.sub,fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Calories Today</p>
        <p style={{color:C.ink,fontSize:28,fontWeight:700}}>{totals.cal} <span style={{color:C.sub,fontSize:14,fontWeight:500}}>/ {targets.cal} kcal</span></p>
        <div style={{marginTop:12}}><ProgressBar value={totals.cal} max={targets.cal} color={calPct>100?C.danger:C.accent} height={10}/></div>
        <p style={{color:C.sub,fontSize:12,marginTop:8}}>{calPct}% of target · {day.restDay?'Rest day':'Training day'}</p>
        {drinksTotalP > 0 && <p style={{color:C.primary,fontSize:12,marginTop:4}}>+{drinksTotalP}g protein from drinks</p>}
      </div>

      {/* Macros */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:12}}>
        <p style={{color:C.ink,fontWeight:600,fontSize:14,marginBottom:12}}>Macros</p>
        <MacroBar label="Protein" value={totals.p} target={targets.p} unit="g" color={C.primary}/>
        <MacroBar label="Carbs" value={totals.c} target={targets.c} unit="g" color={C.accent}/>
        <MacroBar label="Fat" value={totals.f} target={targets.f} unit="g" color="#8A7355"/>
      </div>

      {/* Hydration + Supps */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <div style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:16}}>
          <p style={{color:C.sub,fontSize:11,fontWeight:600,marginBottom:8}}>💧 Hydration</p>
          <p style={{color:C.ink,fontWeight:700,fontSize:16}}>{(waterTotal/1000).toFixed(1)}L</p>
          <p style={{color:C.sub,fontSize:11}}>/ {(waterGoal/1000).toFixed(1)}L</p>
          <div style={{marginTop:8}}><ProgressBar value={waterTotal} max={waterGoal} height={6}/></div>
        </div>
        <div style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:16}}>
          <p style={{color:C.sub,fontSize:11,fontWeight:600,marginBottom:8}}>💊 Supplements</p>
          <p style={{color:C.ink,fontWeight:700,fontSize:16}}>{suppDone}/{suppTotal}</p>
          <p style={{color:C.sub,fontSize:11}}>completed</p>
          <div style={{marginTop:8}}><ProgressBar value={suppDone} max={suppTotal} color={C.accent} height={6}/></div>
        </div>
      </div>

      {/* Weight chart */}
      {Object.values(weights).some(w=>w) && (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:12}}>
          <p style={{color:C.ink,fontWeight:600,fontSize:14,marginBottom:12}}>⚖️ Weight (Last 7 Days)</p>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',height:60}}>
            {Object.entries(weights).sort().map(([d,w]) => {
              const vals = Object.values(weights).filter(v=>v);
              const min = Math.min(...vals) - 0.5;
              const max = Math.max(...vals) + 0.5;
              const h = w ? ((w - min)/(max-min))*50 + 10 : 6;
              return (
                <div key={d} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flex:1}}>
                  {w && <span style={{fontSize:9,color:C.sub}}>{w}</span>}
                  <div style={{background:w?C.primary:'#EFE9D9',width:12,height:h,borderRadius:6}}/>
                  <span style={{fontSize:9,color:d===dateStr?C.primary:C.sub,fontWeight:d===dateStr?700:400}}>
                    {new Date(d+'T00:00:00').toLocaleDateString(undefined,{weekday:'short'}).slice(0,2)}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 7-day score */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:12}}>
        <p style={{color:C.ink,fontWeight:600,fontSize:14,marginBottom:12}}>Last 7 Days</p>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          {Object.entries(history).sort().map(([d,score]) => {
            const active = d === dateStr;
            const color = score >= 80 ? C.primary : score >= 40 ? C.accent : '#D8D0BC';
            return (
              <button key={d} onClick={()=>onJump(d)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,flex:1}}>
                <div style={{background:'#EFE9D9',height:56,width:14,borderRadius:7,display:'flex',alignItems:'flex-end',overflow:'hidden'}}>
                  <div style={{background:color,width:'100%',height:`${Math.max(6,score)}%`,borderRadius:7}}/>
                </div>
                <span style={{fontSize:10,color:active?C.primary:C.sub,fontWeight:active?700:500}}>
                  {new Date(d+'T00:00:00').toLocaleDateString(undefined,{weekday:'short'}).slice(0,1)}
                </span>
              </button>
            );
          })}
        </div>
      </div>
    </Fragment>
  );
}

function MacroBar({label, value, target, unit, color}) {
  return (
    <div style={{marginBottom:12}}>
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:4}}>
        <span style={{color:C.ink,fontSize:13,fontWeight:500}}>{label}</span>
        <span style={{color:C.sub,fontSize:12}}>{value}{unit} / {target}{unit}</span>
      </div>
      <ProgressBar value={value} max={target} color={color}/>
    </div>
  );
}

function calcScore(log, dateStr) {
  if(!log) return 0;
  const suppItems = getActiveSuppItems(log.restDay, dateStr);
  const suppTotal = suppItems.length;
  const suppDone = suppItems.filter(i=>log.supplements[i.id]).length;
  const suppPct = suppTotal ? suppDone/suppTotal : 1;
  const hydTotal = HYDRATION.length + 1;
  const hydDone = HYDRATION.filter(h=>log.hydration[h.id]).length + (log.water>=WATER_GOAL?1:0);
  const hydPct = hydDone/hydTotal;
  const mealSlots = ALL_SLOTS.filter(s=>!(s.skipOnRest&&log.restDay));
  const mealTotal = mealSlots.length;
  const mealDone = mealSlots.filter(s=>log.meals[s.key]).length;
  const mealPct = mealTotal ? mealDone/mealTotal : 1;
  return Math.round((suppPct + hydPct + mealPct)/3 * 100);
}

// ─── RENDER ─────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
